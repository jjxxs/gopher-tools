name: Test
on: [push, pull_request]
jobs:
  linux:
    strategy:
      matrix:
        go-version: [1.25.x, 1.26.x]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test ./...
      - name: Test (race detector)
        run: go test -race ./bus ./websocket ./signal
  macos:
    strategy:
      matrix:
        go-version: [1.25.x, 1.26.x]
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        # Skips ./signal (Linux-only os/signal semantics) and ./system
        # (reads /proc/{loadavg,uptime}). Everything else, including
        # ./websocket, runs cross-OS.
        run: go test ./bus ./config ./server ./websocket
  windows:
    strategy:
      matrix:
        go-version: [1.25.x, 1.26.x]
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        # Skips ./signal (Linux-only os/signal semantics) and ./system
        # (reads /proc/{loadavg,uptime}). Everything else, including
        # ./websocket, runs cross-OS.
        run: go test ./bus ./config ./server ./websocket
